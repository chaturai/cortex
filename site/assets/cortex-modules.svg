<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" font-family="'JetBrains Mono','Roboto',monospace" role="img" aria-labelledby="modtitle moddesc">
  <title id="modtitle">Cortex delivery mechanisms and module stack</title>
  <desc id="moddesc">The Cortex graph is delivered five ways — to the process, to humans (web UI), to agents (MCP), to durable storage (backup), and seeded back from it (restore) — each a single on/off switch. Backup and restore share one S3 client. The published module stack runs api, core, autoconfigure, starter.</desc>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#839496"/>
    </marker>
    <style>
      .box   { fill:#073642; stroke:#586e75; stroke-width:1.5; }
      .core  { fill:#073642; stroke:#268bd2; stroke-width:2.5; }
      .t     { fill:#eee8d5; font-size:14px; font-weight:700; }
      .d     { fill:#93a1a1; font-size:11.5px; }
      .flag  { fill:#2aa198; font-size:11px; }
      .edge  { stroke:#839496; stroke-width:1.6; fill:none; }
      .cap   { fill:#586e75; font-size:11px; letter-spacing:0.12em; }
    </style>
  </defs>

  <rect x="0" y="0" width="760" height="600" fill="#002b36" rx="10"/>

  <text class="cap" x="24" y="30">FIVE DELIVERY MECHANISMS · ONE SWITCH EACH</text>

  <!-- center: the graph -->
  <rect class="core" x="290" y="230" width="210" height="110" rx="10"/>
  <text class="t" x="395" y="272" text-anchor="middle" style="fill:#268bd2">Cortex graph</text>
  <text class="d" x="395" y="292" text-anchor="middle">cortex-core · Apache Jena</text>
  <text class="d" x="395" y="310" text-anchor="middle">approved assertions in TDB2</text>
  <text class="d" x="395" y="328" text-anchor="middle">(in-memory or on disk)</text>

  <!-- Web UI (humans) top-left -->
  <rect class="box" x="40" y="70" width="200" height="82" rx="9"/>
  <text class="t" x="60" y="100">Web UI</text>
  <text class="d" x="60" y="120">to humans — explore &amp; review</text>
  <text class="flag" x="60" y="140">cortex.web.enabled</text>
  <path class="edge" d="M240,120 C300,150 300,200 315,232" marker-end="url(#a)"/>

  <!-- MCP (agents) top-right -->
  <rect class="box" x="520" y="70" width="200" height="82" rx="9"/>
  <text class="t" x="540" y="100">MCP server</text>
  <text class="d" x="540" y="120">to agents — read &amp; write</text>
  <text class="flag" x="540" y="140">cortex.mcp.enabled</text>
  <path class="edge" d="M520,120 C460,150 460,200 470,232" marker-end="url(#a)"/>

  <!-- Backup bottom-left -->
  <rect class="box" x="40" y="430" width="200" height="82" rx="9"/>
  <text class="t" x="60" y="460">Backup</text>
  <text class="d" x="60" y="480">to durable storage (S3)</text>
  <text class="flag" x="60" y="500">cortex.backup.enabled</text>
  <path class="edge" d="M315,340 C300,392 300,430 240,466" marker-end="url(#a)"/>

  <!-- Restore bottom-right -->
  <rect class="box" x="520" y="430" width="200" height="82" rx="9"/>
  <text class="t" x="540" y="460">Restore</text>
  <text class="d" x="540" y="480">seeded back on boot</text>
  <text class="flag" x="540" y="500">cortex.restore.enabled</text>
  <path class="edge" d="M520,466 C460,430 460,392 470,340" marker-end="url(#a)"/>

  <!-- shared S3 client -->
  <rect class="box" x="300" y="440" width="190" height="60" rx="9" style="stroke:#6c71c4;stroke-width:2"/>
  <text class="t" x="395" y="468" text-anchor="middle" style="fill:#6c71c4">S3 client</text>
  <text class="flag" x="395" y="487" text-anchor="middle">cortex.s3.enabled</text>
  <path class="edge" d="M300,478 L240,486" marker-end="url(#a)"/>
  <path class="edge" d="M490,478 L520,486" marker-end="url(#a)"/>

  <!-- module stack strip -->
  <text class="cap" x="24" y="560">PUBLISHED MODULE STACK</text>
  <g transform="translate(250,540)">
    <rect class="box" x="0" y="4" width="70" height="26" rx="5"/><text class="d" x="35" y="21" text-anchor="middle">api</text>
    <path class="edge" d="M70,17 L86,17" marker-end="url(#a)"/>
    <rect class="box" x="88" y="4" width="70" height="26" rx="5"/><text class="d" x="123" y="21" text-anchor="middle">core</text>
    <path class="edge" d="M158,17 L174,17" marker-end="url(#a)"/>
    <rect class="box" x="176" y="4" width="120" height="26" rx="5"/><text class="d" x="236" y="21" text-anchor="middle">autoconfigure</text>
    <path class="edge" d="M296,17 L312,17" marker-end="url(#a)"/>
    <rect class="box" x="314" y="4" width="80" height="26" rx="5"/><text class="d" x="354" y="21" text-anchor="middle">starter</text>
  </g>
</svg>
