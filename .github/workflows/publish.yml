name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Read current version
        id: version
        run: echo "version=$(grep '^version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache

      - name: Tag release and bump patch version
        run: |
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$version"

          # Keep README.md's install snippets pointing at the version that was just published to
          # Maven Central. This is what the 0.0.1-vs-0.0.6 drift was: this job bumped
          # gradle.properties and tagged on every release, but nothing ever touched the docs, so
          # README.md kept advertising the version it happened to be written at. Do this with
          # $version (just published), not the $next dev version computed below, so the README
          # always names an artifact that actually exists on Maven Central.
          sed -i -E "s/(cortex-spring-boot-starter:)[0-9]+\.[0-9]+\.[0-9]+/\1$version/" README.md
          sed -i -E "s/(<version>)[0-9]+\.[0-9]+\.[0-9]+(<\/version>)/\1$version\2/" README.md

          IFS=. read -r major minor patch <<< "$version"
          next="$major.$minor.$((patch + 1))"
          sed -i "s/^version=.*/version=$next/" gradle.properties
          git commit -am "chore: bump version to $next [skip ci]"
          git push origin main --follow-tags
