<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head th:replace="~{fragments :: head('Assertions')}"></head>
  <body>
    <nav th:replace="~{fragments :: navbar}"></nav>
    <main>
      <div class="describe-container">
        <h1 th:text="${subject}"></h1>
        <ul class="statement-list" th:if="${!statements.isEmpty()}">
          <li class="statement-item" th:each="statement : ${statements}" th:classappend="${statement.created == null ? 'statement-inferred' : 'statement-asserted'}">
            <code class="statement-predicate">
              <a
                class="code-link"
                th:href="@{/assertions(uri=${statement.predicate.uri})}"
                th:text="${statement.predicate.prefix != null ? statement.predicate.prefix + ':' + statement.predicate.localName : statement.predicate.localName}"></a>
            </code>
            <code class="statement-object">
              <a
                class="code-link"
                th:if="${statement.object.uri != null}"
                th:href="@{/assertions(uri=${statement.object.uri})}"
                th:text="${statement.object.prefix != null ? statement.object.prefix + ':' + statement.object.localName : statement.object.localName}"></a>
              <span th:unless="${statement.object.uri != null}" th:text="${statement.object.localName}"></span>
            </code>
            <span
              class="statement-created"
              th:if="${statement.created != null}"
              th:text="${statement.created}"></span>
            <span class="statement-inferred-badge" th:if="${statement.created == null}">inferred</span>
          </li>
        </ul>
        <p class="statements-empty" th:if="${statements.isEmpty()}">
          No statements for this subject.
        </p>
      </div>
    </main>
  </body>
</html>
