<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head th:replace="~{fragments :: head('Branches')}"></head>
  <body>
    <nav th:replace="~{fragments :: navbar}"></nav>
    <main>
      <div class="branches-container">
        <div class="branches-list">
          <div class="branch-item" th:each="branch : ${branches}">
            <a class="branch-link" th:href="@{/branches/{branch}(branch=${branch.name})}" th:text="${branch.name}"></a>
            <div class="branch-badges">
              <span class="badge badge-activity">prov:Activity</span>
              <span class="badge badge-started" th:if="${branch.started != null}" th:text="${branch.started}"></span>
              <span class="badge badge-size" th:text="${branch.size} + ' triples'"></span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
